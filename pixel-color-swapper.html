<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Color Swapper</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #16213e;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 2px solid #0f3460;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: #e94560;
  }

  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* --- Sidebar --- */
  .sidebar {
    width: 320px;
    min-width: 320px;
    background: #16213e;
    border-right: 2px solid #0f3460;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel {
    background: #1a1a2e;
    border: 1px solid #0f3460;
    border-radius: 8px;
    padding: 14px;
  }

  .panel h3 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #e94560;
    margin-bottom: 12px;
    border-bottom: 1px solid #0f3460;
    padding-bottom: 6px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-primary {
    background: #e94560;
    color: #fff;
  }
  .btn-primary:hover { background: #c73650; }
  .btn-primary:disabled { background: #555; cursor: not-allowed; }

  .btn-secondary {
    background: #0f3460;
    color: #e0e0e0;
  }
  .btn-secondary:hover { background: #1a4a80; }

  .btn-full { width: 100%; }

  .btn-small { padding: 5px 10px; font-size: 12px; }

  label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }

  input[type="color"] {
    width: 100%;
    height: 40px;
    border: 2px solid #0f3460;
    border-radius: 6px;
    background: #1a1a2e;
    cursor: pointer;
    padding: 2px;
  }

  input[type="range"] {
    width: 100%;
    accent-color: #e94560;
  }

  input[type="number"] {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #0f3460;
    border-radius: 4px;
    background: #1a1a2e;
    color: #e0e0e0;
    font-size: 13px;
  }

  .color-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .color-row .swatch {
    width: 36px;
    height: 36px;
    border-radius: 6px;
    border: 2px solid #0f3460;
    flex-shrink: 0;
  }

  .color-row .hex {
    font-family: 'Consolas', monospace;
    font-size: 14px;
    flex: 1;
  }

  .swap-rules-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 220px;
    overflow-y: auto;
    margin-bottom: 10px;
  }

  .swap-rule {
    display: flex;
    align-items: center;
    gap: 8px;
    background: #16213e;
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 12px;
  }

  .swap-rule .arrow { color: #e94560; font-weight: bold; font-size: 16px; }

  .swap-rule .remove-rule {
    margin-left: auto;
    background: none;
    border: none;
    color: #e94560;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 2px 4px;
  }
  .swap-rule .remove-rule:hover { color: #ff6b81; }

  .mini-swatch {
    width: 22px;
    height: 22px;
    border-radius: 4px;
    border: 1px solid #0f3460;
    display: inline-block;
  }

  .tolerance-display {
    text-align: center;
    font-family: monospace;
    font-size: 13px;
    color: #e94560;
    margin-top: 2px;
  }

  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .zoom-controls span {
    font-size: 13px;
    min-width: 50px;
    text-align: center;
  }

  .status-bar {
    font-size: 12px;
    color: #888;
    padding: 4px 0;
  }

  /* --- Canvas Area --- */
  .canvas-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    background:
      repeating-conic-gradient(#2a2a3e 0% 25%, #222236 0% 50%) 0 0 / 20px 20px;
  }

  .canvas-wrapper {
    position: relative;
    cursor: crosshair;
  }

  #mainCanvas {
    display: block;
    image-rendering: pixelated;
  }

  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
  }

  .drop-zone.has-image { display: none; }

  .drop-zone svg {
    width: 80px;
    height: 80px;
    stroke: #555;
  }

  .drop-zone p { color: #666; font-size: 16px; }

  /* Hover pixel info */
  .pixel-info-float {
    position: fixed;
    padding: 6px 10px;
    background: rgba(22, 33, 62, 0.95);
    border: 1px solid #e94560;
    border-radius: 6px;
    font-size: 12px;
    font-family: monospace;
    pointer-events: none;
    display: none;
    z-index: 100;
    white-space: nowrap;
  }

  .pixel-info-float .pip {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid #555;
    vertical-align: middle;
    margin-right: 4px;
  }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 120px;
    overflow-y: auto;
  }

  .history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: #888;
    padding: 3px 0;
    border-bottom: 1px solid #0f346033;
  }

  .history-item button {
    background: none;
    border: none;
    color: #e94560;
    cursor: pointer;
    font-size: 11px;
  }
  .history-item button:hover { text-decoration: underline; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #0f3460;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s;
    z-index: 200;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<header>
  <h1>Pixel Color Swapper</h1>
</header>

<div class="main-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <!-- Load Image -->
    <div class="panel">
      <h3>Image</h3>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <button class="btn btn-primary btn-full" onclick="document.getElementById('fileInput').click()">Load Image</button>
      <div class="status-bar" id="imageInfo">No image loaded</div>
    </div>

    <!-- Picked Color -->
    <div class="panel">
      <h3>Eyedropper (click canvas)</h3>
      <div class="color-row">
        <div class="swatch" id="pickedSwatch" style="background:#000"></div>
        <div>
          <div class="hex" id="pickedHex">#000000</div>
          <div style="font-size:11px;color:#888" id="pickedRGB">rgb(0, 0, 0)</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-small" id="usePickedAsFrom" disabled>Use as Source</button>
      <button class="btn btn-secondary btn-small" id="usePickedAsTo" disabled>Use as Target</button>
    </div>

    <!-- Swap Setup -->
    <div class="panel">
      <h3>Color Swap Rule</h3>
      <div style="margin-bottom:10px">
        <label>Source Color (swap FROM)</label>
        <input type="color" id="colorFrom" value="#ff0000">
      </div>
      <div style="margin-bottom:10px">
        <label>Target Color (swap TO)</label>
        <input type="color" id="colorTo" value="#0000ff">
      </div>
      <div style="margin-bottom:10px">
        <label>Tolerance (0 = exact match, higher = similar colors)</label>
        <input type="range" id="tolerance" min="0" max="100" value="0">
        <div class="tolerance-display" id="tolDisplay">0</div>
      </div>
      <button class="btn btn-primary btn-full" id="addRuleBtn" disabled>Add Rule</button>
    </div>

    <!-- Rules List -->
    <div class="panel">
      <h3>Swap Rules</h3>
      <div class="swap-rules-list" id="rulesList">
        <div style="font-size:12px;color:#666">No rules added yet.</div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" id="applyBtn" disabled style="flex:1">Apply Swaps</button>
        <button class="btn btn-secondary" id="clearRulesBtn" disabled>Clear</button>
      </div>
    </div>

    <!-- Zoom -->
    <div class="panel">
      <h3>View</h3>
      <div class="zoom-controls">
        <button class="btn btn-secondary btn-small" id="zoomOut">-</button>
        <span id="zoomLevel">100%</span>
        <button class="btn btn-secondary btn-small" id="zoomIn">+</button>
        <button class="btn btn-secondary btn-small" id="zoomFit">Fit</button>
      </div>
    </div>

    <!-- History -->
    <div class="panel">
      <h3>History</h3>
      <div class="history-list" id="historyList">
        <div style="font-size:12px;color:#666">No edits yet.</div>
      </div>
      <button class="btn btn-secondary btn-full" id="undoBtn" disabled style="margin-top:8px">Undo Last</button>
    </div>

    <!-- Export -->
    <div class="panel">
      <h3>Export</h3>
      <button class="btn btn-primary btn-full" id="exportBtn" disabled>Save Image (PNG)</button>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-area" id="canvasArea">
    <div class="canvas-wrapper" id="canvasWrapper">
      <canvas id="mainCanvas" width="1" height="1"></canvas>
    </div>
    <div class="drop-zone" id="dropZone">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <path d="M12 16V4m0 0L8 8m4-4l4 4M4 14v4a2 2 0 002 2h12a2 2 0 002-2v-4"/>
      </svg>
      <p>Drop an image here or click "Load Image"</p>
    </div>
  </div>
</div>

<!-- Floating pixel info -->
<div class="pixel-info-float" id="pixelFloat">
  <span class="pip" id="floatPip"></span>
  <span id="floatText">#000000</span>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const canvasArea = document.getElementById('canvasArea');
const canvasWrapper = document.getElementById('canvasWrapper');
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const pixelFloat = document.getElementById('pixelFloat');
const floatPip = document.getElementById('floatPip');
const floatText = document.getElementById('floatText');

let imageLoaded = false;
let zoom = 1;
let rules = [];
let history = [];
let originalImageData = null;

// --- Image Loading ---
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadImageFile(e.target.files[0]);
});

canvasArea.addEventListener('dragover', e => { e.preventDefault(); });
canvasArea.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files[0]) loadImageFile(e.dataTransfer.files[0]);
});

function loadImageFile(file) {
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
    imageLoaded = true;
    originalImageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    history = [];
    updateHistoryUI();
    dropZone.classList.add('has-image');
    document.getElementById('imageInfo').textContent =
      `${img.width} x ${img.height} px`;
    fitZoom();
    updateButtons();
    toast('Image loaded');
  };
  img.src = URL.createObjectURL(file);
}

// --- Zoom ---
function setZoom(z) {
  zoom = Math.max(0.1, Math.min(20, z));
  canvasWrapper.style.transform = `scale(${zoom})`;
  canvasWrapper.style.transformOrigin = 'center center';
  document.getElementById('zoomLevel').textContent = Math.round(zoom * 100) + '%';
}

function fitZoom() {
  const areaW = canvasArea.clientWidth - 40;
  const areaH = canvasArea.clientHeight - 40;
  const z = Math.min(areaW / canvas.width, areaH / canvas.height, 1);
  setZoom(z);
}

document.getElementById('zoomIn').onclick = () => setZoom(zoom * 1.3);
document.getElementById('zoomOut').onclick = () => setZoom(zoom / 1.3);
document.getElementById('zoomFit').onclick = fitZoom;

// --- Eyedropper ---
canvas.addEventListener('mousemove', e => {
  if (!imageLoaded) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / canvas.width));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / canvas.height));
  if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) {
    pixelFloat.style.display = 'none';
    return;
  }
  const px = ctx.getImageData(x, y, 1, 1).data;
  const hex = rgbToHex(px[0], px[1], px[2]);
  floatPip.style.background = hex;
  floatText.textContent = `${hex}  (${x}, ${y})`;
  pixelFloat.style.display = 'block';
  pixelFloat.style.left = (e.clientX + 16) + 'px';
  pixelFloat.style.top = (e.clientY + 16) + 'px';
});

canvas.addEventListener('mouseleave', () => { pixelFloat.style.display = 'none'; });

canvas.addEventListener('click', e => {
  if (!imageLoaded) return;
  const rect = canvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / (rect.width / canvas.width));
  const y = Math.floor((e.clientY - rect.top) / (rect.height / canvas.height));
  if (x < 0 || y < 0 || x >= canvas.width || y >= canvas.height) return;
  const px = ctx.getImageData(x, y, 1, 1).data;
  const hex = rgbToHex(px[0], px[1], px[2]);
  document.getElementById('pickedSwatch').style.background = hex;
  document.getElementById('pickedHex').textContent = hex;
  document.getElementById('pickedRGB').textContent = `rgb(${px[0]}, ${px[1]}, ${px[2]})`;
  document.getElementById('usePickedAsFrom').disabled = false;
  document.getElementById('usePickedAsTo').disabled = false;
  // Store for quick-use
  canvas.dataset.pickedColor = hex;
});

document.getElementById('usePickedAsFrom').onclick = () => {
  document.getElementById('colorFrom').value = canvas.dataset.pickedColor;
};
document.getElementById('usePickedAsTo').onclick = () => {
  document.getElementById('colorTo').value = canvas.dataset.pickedColor;
};

// --- Tolerance slider ---
document.getElementById('tolerance').oninput = function() {
  document.getElementById('tolDisplay').textContent = this.value;
};

// --- Rules ---
document.getElementById('addRuleBtn').onclick = () => {
  const from = document.getElementById('colorFrom').value;
  const to = document.getElementById('colorTo').value;
  const tol = parseInt(document.getElementById('tolerance').value);
  rules.push({ from, to, tol });
  updateRulesUI();
  updateButtons();
  toast('Rule added');
};

function updateRulesUI() {
  const list = document.getElementById('rulesList');
  if (rules.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:#666">No rules added yet.</div>';
    return;
  }
  list.innerHTML = rules.map((r, i) => `
    <div class="swap-rule">
      <span class="mini-swatch" style="background:${r.from}"></span>
      <span style="font-family:monospace">${r.from}</span>
      <span class="arrow">&rarr;</span>
      <span class="mini-swatch" style="background:${r.to}"></span>
      <span style="font-family:monospace">${r.to}</span>
      <span style="color:#888">(tol:${r.tol})</span>
      <button class="remove-rule" data-idx="${i}">&times;</button>
    </div>
  `).join('');
  list.querySelectorAll('.remove-rule').forEach(btn => {
    btn.onclick = () => {
      rules.splice(parseInt(btn.dataset.idx), 1);
      updateRulesUI();
      updateButtons();
    };
  });
}

document.getElementById('clearRulesBtn').onclick = () => {
  rules = [];
  updateRulesUI();
  updateButtons();
};

// --- Apply ---
document.getElementById('applyBtn').onclick = () => {
  if (!imageLoaded || rules.length === 0) return;
  // Save to history
  const before = ctx.getImageData(0, 0, canvas.width, canvas.height);
  history.push({ imageData: before, label: `Swap (${rules.length} rule${rules.length > 1 ? 's' : ''})` });

  const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const d = imgData.data;
  let swapped = 0;

  for (let i = 0; i < d.length; i += 4) {
    for (const rule of rules) {
      const [fr, fg, fb] = hexToRgb(rule.from);
      const [tr, tg, tb] = hexToRgb(rule.to);
      const dist = colorDist(d[i], d[i+1], d[i+2], fr, fg, fb);
      if (dist <= rule.tol) {
        d[i]   = tr;
        d[i+1] = tg;
        d[i+2] = tb;
        swapped++;
        break; // first matching rule wins
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  updateHistoryUI();
  toast(`Swapped ${swapped.toLocaleString()} pixels`);
};

// --- Undo ---
document.getElementById('undoBtn').onclick = () => {
  if (history.length === 0) return;
  const prev = history.pop();
  ctx.putImageData(prev.imageData, 0, 0);
  updateHistoryUI();
  toast('Undone');
};

function updateHistoryUI() {
  const list = document.getElementById('historyList');
  document.getElementById('undoBtn').disabled = history.length === 0;
  if (history.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:#666">No edits yet.</div>';
    return;
  }
  list.innerHTML = history.map((h, i) =>
    `<div class="history-item"><span>#${i + 1} ${h.label}</span></div>`
  ).join('');
  list.scrollTop = list.scrollHeight;
}

// --- Export ---
document.getElementById('exportBtn').onclick = () => {
  const link = document.createElement('a');
  link.download = 'swapped-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
  toast('Image saved');
};

// --- Helpers ---
function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(c => c.toString(16).padStart(2, '0')).join('');
}

function hexToRgb(hex) {
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function colorDist(r1, g1, b1, r2, g2, b2) {
  return Math.sqrt((r1 - r2) ** 2 + (g1 - g2) ** 2 + (b1 - b2) ** 2);
}

function updateButtons() {
  const hasRules = rules.length > 0;
  document.getElementById('addRuleBtn').disabled = !imageLoaded;
  document.getElementById('applyBtn').disabled = !imageLoaded || !hasRules;
  document.getElementById('clearRulesBtn').disabled = !hasRules;
  document.getElementById('exportBtn').disabled = !imageLoaded;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

updateButtons();
</script>
</body>
</html>
