# Deploy site/ to GitHub Pages (project site).
# Repo Settings → Pages → Source must be "GitHub Actions".
name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # GitHub Pages serves style.css / main.js / tiers.js / the DRBG module
      # with a 10-min browser cache and no content-hashed filenames, so edits
      # can appear "stuck" behind a stale cache. Stamp the commit SHA onto those
      # asset references at deploy time so every release has unique URLs and
      # browsers always fetch the new code. Every page that loads these assets
      # is rewritten (not just index.html) — otherwise fairness.html / reveal /
      # wallet would keep serving stale CSS/JS after a deploy. Both attribute
      # forms (href="…"/src="…") and the ES-module `from "./…"` specifier are
      # covered. Only the deployed artifact is rewritten; the committed HTML
      # stays clean for local development.
      - name: Cache-bust versioned asset links
        run: |
          V="${GITHUB_SHA}"
          for f in site/*.html; do
            sed -i \
              -e "s|style\.css\"|style.css?v=${V}\"|g" \
              -e "s|main\.js\"|main.js?v=${V}\"|g" \
              -e "s|tiers\.js\"|tiers.js?v=${V}\"|g" \
              -e "s|shipgen_drbg\.js\"|shipgen_drbg.js?v=${V}\"|g" \
              "$f"
          done
          echo "Stamped asset version ${V}:"
          grep -rnE '\?v=' site/*.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
